<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManiaci - Login & Register</title>
    <link rel="stylesheet" href="../css/for_all.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <nav>
        <a href="catalogo.html">🎬 Catalogo</a>
        <a href="playlist.html">📂 Mie Playlist</a>
        <a href="login.html">🔑 Autenticazione</a>
    </nav>

    <div class="container">
        <h1>🔐 Area Utente</h1>
        <hr class="login-divider">

        <div class="card">
            <h3>1. Registra Account</h3>
            <input type="text" id="regUser" placeholder="Scegli Username">
            <input type="password" id="regPass" placeholder="Scegli Password">
            <button onclick="eseguiRegistrazione()">Invia Registrazione</button>
        </div>

        <div class="card">
            <h3>2. Effettua il Login</h3>
            <input type="text" id="logUser" placeholder="Inserisci Username">
            <input type="password" id="logPass" placeholder="Inserisci Password">
            <button onclick="eseguiLogin()">Accedi</button>
            <button class="btn-logout" onclick="eseguiLogout()">Esci (Logout)</button>
        </div>
        
        <div id="statoSessione"></div>
    </div>
    
    <script src="../js/login.js" defer></script>
</body>
</html>
