<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManiaci - Catalogo Film</title>
    <link rel="stylesheet" href="../css/for_all.css">
    <link rel="stylesheet" href="../css/catalogo.css">
</head>
<body>

    <nav>
        <a href="catalogo.html">🎬 Catalogo</a>
        <a href="playlist.html">📂 Mie Playlist</a>
        <a href="login.html">🔑 Autenticazione</a>
    </nav>

    <div class="container">
        <h1>🎬 Archivio CineManiaci</h1>
        
        <div class="search-box">
            <input type="text" id="campoCerca" placeholder="Cerca un titolo (es. Inception)...">
            <button onclick="avviaRicerca()">Filtra Film</button>
        </div>

        <div class="form-box" id="boxInserimentoFilm">
            <h3>➕ Non trovi il film? Aggiungilo Ora</h3>
            <input type="text" id="newTitolo" class="input-full" placeholder="Titolo">
            <textarea id="newTrama" class="textarea-trama" placeholder="Trama film..."style="margin-top: 3px"></textarea>
            <div class="form-row">
                <input type="number" id="newAnno" class="input-anno" placeholder="Anno">
                <input type="text" id="newPoster" class="input-poster" placeholder="URL Locandina"style="margin-top: 3px">
                <input type="text" id="newTmdb" class="input-tmdb" placeholder="ID TMDB"style="margin-top: 3px">
            </div>
            <input type="text" id="newTrailer" class="input-full" placeholder="URL Trailer YouTube (Opzionale)" style="margin-top: 3px"><br>
            <button class="btn-success btn-margine" onclick="inserisciFilmManuale()" style="margin-top: 3px">Carica nel DB</button>
        </div>

        <h2>Risultati Ricerca</h2>
        <div id="risultati" class="grid-catalogo"></div>

        <div id="schedaFilm" class="scheda-tecnica">
            <h2 id="schedaTitolo"></h2>
            <div class="scheda-contenuto">
                <img id="schedaImmagine" class="scheda-img" src="" alt="Locandina">
                <div>
                    <p><b>Anno di Uscita:</b> <span id="schedaAnno"></span></p>
                    <p><b>Trama:</b></p>
                    <p id="schedaTrama"></p>
                </div>
            </div>
            
            <hr class="scheda-divider">
            
            <h3>📺 Video community e recensioni YouTube</h3>
            <div id="listaCommenti"></div>

            <div id="formRecensione">
                <h4>Aggiungi la tua video recensione</h4>
                <textarea id="recTesto" class="rec-textarea" placeholder="Inserisci il tuo commento testuale..."></textarea>
                <input type="hidden" id="recFilmId">
                <button class="btn-success" onclick="inviaCommentoVideo()">Invia Video Recensione</button>
            </div>
        </div>
    </div>

    <script src="../js/catalogo.js" defer></script>
</body>
</html>
